<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>My Link Tree</title>
    <style>
        /* 簡単なデザイン設定 */
        body { font-family: sans-serif; text-align: center; background-color: #54B1BF; padding: 50px; }
        .container { max-width: 400px; margin: 0 auto; }
        .link-card { 
            display: block; 
            background: white; 
            margin: 15px 0; 
            padding: 15px; 
            text-decoration: none; 
            color: #7876EE; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .link-card:hover { transform: scale(1.05); background: #e9ecef; }
        h1 { color: #444; }
    </style>
</head>
<body>

    <div class="container">
        <h1>m o g u</h1>

        <a href="https://www.youtube.com/channel/UCjxtM9kZQYdkdi8H-gQ38og" class="link-card" target="_blank">Youtube</a>
        <a href="https://music.apple.com/jp/artist/1654886834" class="link-card" target="_blank">AppleMusic</a>
        <a href="https://open.spotify.com/artist/5wJyoOXTtLjjVd1C30OtnL" class="link-card" target="_blank">Spotify</a>
        <a href="https://music.amazon.co.jp/artists/B0BMY3PP3K/m-o-g-u" class="link-card" target="_blank">AmazonMusic</a>
        <a href="https://unityroom.com/users/mogumogu-mogu" class="link-card" target="_blank">unityroom</a>

    </div>

</body>
</html>
